<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Pack Value Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════
           VARIABLES & RESET
           ═══════════════════════════════════════════════ */
        :root {
            --bg-abyss: #070a12;
            --bg-deep: #0b0f1a;
            --bg-card: #101523;
            --bg-elevated: #151c30;
            --bg-hover: #1a2340;
            --bg-inset: #080c14;
            --gold-900: #6b5220;
            --gold-700: #a07c35;
            --gold: #c9a84c;
            --gold-400: #dfc06a;
            --gold-200: #f0d78c;
            --gold-glow: rgba(201, 168, 76, 0.12);
            --gold-glow-strong: rgba(201, 168, 76, 0.25);
            --text: #e4ddd0;
            --text-muted: #7d7b85;
            --text-dim: #44434d;
            --emerald: #34d399;
            --emerald-dim: #065f46;
            --ruby: #f87171;
            --ruby-dim: #7f1d1d;
            --info-blue: #60a5fa;
            --info-blue-deep: #1d4ed8;
            --info-blue-glow: rgba(96, 165, 250, 0.22);
            --border: rgba(201, 168, 76, 0.08);
            --border-strong: rgba(201, 168, 76, 0.2);
            --shadow-soft: 0 14px 34px rgba(0, 0, 0, 0.28);
            --shadow-tight: 0 6px 16px rgba(0, 0, 0, 0.22);
            --radius: 8px;
            --radius-lg: 12px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-abyss);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Subtle noise grain overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            opacity: 0.025;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="a"><feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%25" height="100%25" filter="url(%23a)"/></svg>');
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 9999;
        }

        /* Ambient depth wash */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(140deg, rgba(201, 168, 76, 0.04) 0%, transparent 34%),
                linear-gradient(320deg, rgba(52, 211, 153, 0.025) 0%, transparent 32%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.012), transparent 38%);
            pointer-events: none;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════ */
        header {
            position: relative;
            text-align: center;
            padding: 12px 20px;
            background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg-deep) 100%);
            border-bottom: 1px solid var(--border-strong);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            z-index: 10;
        }

        header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2em;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--gold-700), var(--gold-200), var(--gold), var(--gold-200), var(--gold-700));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s linear infinite;
            line-height: 1.15;
            white-space: nowrap;
        }

        header p {
            display: none;
        }

        header .disclaimer {
            display: none;
        }

        /* ── Header action buttons group ── */
        .header-actions {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-toggle {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(96, 165, 250, 0.48);
            background: linear-gradient(180deg, rgba(96, 165, 250, 0.2), rgba(29, 78, 216, 0.12));
            color: #dbeafe;
            font-family: 'Cinzel', serif;
            font-size: 0.92em;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.2s;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 0 14px rgba(96, 165, 250, 0.08);
        }

        .info-toggle:hover {
            border-color: var(--info-blue);
            background: linear-gradient(180deg, rgba(96, 165, 250, 0.28), rgba(29, 78, 216, 0.18));
            box-shadow: 0 0 16px var(--info-blue-glow);
        }

        .info-toggle:active {
            transform: scale(0.93);
        }

        .store-btn {
            display: inline-block;
            background: var(--bg-card);
            color: var(--emerald);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 6px;
            padding: 6px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .store-btn:hover {
            background: var(--bg-elevated);
            border-color: rgba(52, 211, 153, 0.4);
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.12);
        }

        .store-btn:active {
            transform: scale(0.93);
        }

        .lang-toggle {
            background: var(--bg-card);
            color: var(--gold);
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            padding: 6px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .lang-toggle:hover {
            background: var(--bg-elevated);
            border-color: var(--gold-700);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .lang-toggle:active {
            transform: scale(0.93);
        }

        @keyframes shimmer {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        /* ═══════════════════════════════════════════════
           MAIN LAYOUT
           ═══════════════════════════════════════════════ */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .panel {
            flex: 1;
            padding: 22px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-900) transparent;
            min-width: 0;
        }

        .panel::-webkit-scrollbar { width: 5px; }
        .panel::-webkit-scrollbar-track { background: transparent; }
        .panel::-webkit-scrollbar-thumb { background: var(--gold-900); border-radius: 4px; }

        .panel-left {
            background: linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-abyss) 100%);
            border-right: 1px solid var(--border);
            max-width: 50%;
        }

        .panel-right {
            background: var(--bg-abyss);
            max-width: 50%;
        }

        /* Section titles */
        .section-title {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: 0.85em;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 2;
            padding-bottom: 12px;
            background: linear-gradient(180deg, var(--bg-abyss) 0%, rgba(7, 10, 18, 0.92) 72%, transparent 100%);
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-strong), transparent);
        }

        /* ═══════════════════════════════════════════════
           LEFT PANEL — YOUR PACK
           ═══════════════════════════════════════════════ */
        .pack-empty {
            color: var(--text-dim);
            text-align: center;
            padding: 52px 24px;
            font-size: 0.9em;
            font-style: italic;
            border: 1px dashed var(--border-strong);
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.035), rgba(255, 255, 255, 0.01));
            animation: emptyPulse 3s ease-in-out infinite;
        }

        @keyframes emptyPulse {
            0%, 100% { border-color: var(--border-strong); }
            50% { border-color: rgba(201, 168, 76, 0.18); }
        }

        .pack-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.018), var(--bg-card));
            border-radius: var(--radius);
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--gold-700);
            box-shadow: var(--shadow-tight);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            animation: slideIn 0.25s ease-out;
        }

        .pack-item:hover {
            background: var(--bg-elevated);
            border-left-color: var(--gold);
            transform: translateY(-1px);
        }

        .pack-item-body {
            flex: 1;
            min-width: 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .pack-item-name {
            font-weight: 600;
            font-size: 0.9em;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pack-item-detail {
            font-size: 0.78em;
            color: var(--text-muted);
            margin-top: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .gem-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: linear-gradient(135deg, var(--gold), var(--gold-200));
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .pack-item-remove {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.85em;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            transition: all 0.15s;
            border: none;
            background: none;
            font-family: inherit;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pack-item-remove:hover {
            color: var(--ruby);
            background: rgba(127, 29, 29, 0.4);
        }

        .pack-item-remove:active {
            transform: scale(0.9);
        }

        /* Pack total box */
        .pack-total {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-strong);
            position: sticky;
            bottom: 0;
            z-index: 3;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
        }

        .pack-total::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-glow) 0%, transparent 60%);
            pointer-events: none;
        }

        .pack-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            position: relative;
        }

        .pack-total-row + .pack-total-row {
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .pack-total-label {
            font-size: 0.82em;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .pack-total-value {
            font-weight: 700;
            font-size: 1.05em;
            color: var(--gold-400);
        }

        .pack-total-value-thb {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2em;
            color: var(--emerald);
        }

        /* ═══════════════════════════════════════════════
           RIGHT PANEL — ITEM CATALOG
           ═══════════════════════════════════════════════ */
        .category-header {
            font-family: 'Cinzel', serif;
            font-weight: 500;
            font-size: 0.72em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-header:first-child { padding-top: 0; }

        .category-header::before {
            content: "";
            width: 12px;
            height: 1px;
            background: var(--gold-700);
        }

        .catalog-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 56px;
            padding: 10px 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.014), var(--bg-card));
            border-radius: var(--radius);
            margin-bottom: 6px;
            border: 1px solid var(--border);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.16);
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .catalog-item:hover {
            background: var(--bg-elevated);
            border-color: var(--border-strong);
            transform: translateY(-1px);
            box-shadow: var(--shadow-tight);
        }

        .catalog-item.active {
            border-color: var(--gold-glow-strong);
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.05), var(--bg-card));
            box-shadow: inset 3px 0 0 var(--gold-700), var(--shadow-tight);
        }

        .catalog-item.active:hover {
            border-color: var(--border-strong);
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.08), var(--bg-elevated));
        }

        .catalog-item-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .catalog-item-icon img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            image-rendering: auto;
        }

        .catalog-item-info { flex: 1; min-width: 0; }

        .catalog-item-name {
            font-weight: 500;
            font-size: 0.9em;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .catalog-item-gems {
            font-size: 0.75em;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 1px;
        }

        .catalog-item-controls {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 0;
        }

        .catalog-item-qty {
            width: 42px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9em;
            color: var(--emerald);
            font-variant-numeric: tabular-nums;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 0;
            font-family: inherit;
            outline: none;
            -moz-appearance: textfield;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .catalog-item-qty:hover {
            border-color: var(--border-strong);
        }

        .catalog-item-qty:focus {
            border-color: var(--gold-700);
            box-shadow: 0 0 0 2px var(--gold-glow);
        }

        .catalog-item-qty.zero { color: var(--text-dim); }

        /* Hide number input arrows */
        .catalog-item-qty::-webkit-outer-spin-button,
        .catalog-item-qty::-webkit-inner-spin-button,
        #sale-price::-webkit-outer-spin-button,
        #sale-price::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #sale-price { -moz-appearance: textfield; }

        .btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn:active { transform: scale(0.9); }

        .btn-add {
            background: linear-gradient(135deg, var(--gold-900), var(--gold-700));
            color: var(--gold-200);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn-add:hover {
            background: linear-gradient(135deg, var(--gold-700), var(--gold));
            color: #fff;
            box-shadow: 0 2px 10px var(--gold-glow-strong);
        }

        .btn-sub {
            background: var(--bg-deep);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-sub:hover {
            background: var(--bg-hover);
            color: var(--text-muted);
            border-color: var(--border-strong);
        }

        .btn-sub.disabled {
            opacity: 0.25;
            pointer-events: none;
        }

        /* Keyboard focus visibility */
        .btn:focus-visible,
        .btn-calc:focus-visible,
        .btn-clear:focus-visible,
        .info-toggle:focus-visible,
        .store-btn:focus-visible,
        .lang-toggle:focus-visible {
            outline: 2px solid var(--gold-700);
            outline-offset: 2px;
        }

        .pack-item-remove:focus-visible {
            outline: 2px solid var(--ruby);
            outline-offset: 2px;
        }

        .catalog-item-qty:focus-visible {
            border-color: var(--gold-700);
            box-shadow: 0 0 0 2px var(--gold-glow);
        }

        /* ═══════════════════════════════════════════════
           BOTTOM BAR
           ═══════════════════════════════════════════════ */
        footer {
            position: relative;
            padding: 16px 24px;
            background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg-deep) 100%);
            border-top: 1px solid var(--border-strong);
            box-shadow: 0 -12px 30px rgba(0, 0, 0, 0.24);
            z-index: 10;
        }

        footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-700), transparent);
        }

        .footer-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            max-width: 980px;
            margin: 0 auto;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 260px;
        }

        .input-group label {
            font-family: 'Cinzel', serif;
            font-size: 0.78em;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap input {
            padding: 9px 46px 9px 14px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            background: var(--bg-abyss);
            color: var(--gold-200);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            width: 150px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input::placeholder { color: var(--text-dim); font-weight: 400; }
        .input-wrap input:focus {
            outline: none;
            border-color: var(--gold-700);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        .input-suffix {
            position: absolute;
            right: 12px;
            font-size: 0.8em;
            color: var(--text-dim);
            font-weight: 500;
            pointer-events: none;
        }

        .btn-calc {
            padding: 9px 24px;
            background: linear-gradient(135deg, var(--gold-900), var(--gold-700), var(--gold));
            color: var(--bg-abyss);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s;
            min-width: 132px;
            box-shadow: 0 2px 12px rgba(201, 168, 76, 0.2);
        }

        .btn-calc:hover {
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.35);
            transform: translateY(-1px);
        }

        .btn-calc:active { transform: translateY(0) scale(0.98); }

        .btn-clear {
            padding: 9px 16px;
            background: none;
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.82em;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn-clear:hover {
            color: var(--text-muted);
            border-color: var(--border-strong);
            background: var(--bg-card);
            transform: translateY(-1px);
        }

        .btn-clear:active {
            transform: translateY(0) scale(0.98);
        }

        /* ═══════════════════════════════════════════════
           RESULT DISPLAY
           ═══════════════════════════════════════════════ */
        .result {
            margin-top: 14px;
            animation: fadeUp 0.35s ease-out;
        }

        .result:empty { margin-top: 0; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            padding: 14px 18px;
            background:

            height: 32px;

            gap: 2px;

            color: var(--text-muted);

            letter-spacing: 2px;

            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;

            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(217, 70, 239, 0.15));
            color: #e9d5ff;
            border: 1px solid #7c3aed;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .deal-legendary {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.2), rgba(240, 215, 140, 0.1));

        .deal-good {

            color: #86efac;
            border: 1px solid #166534;
        }

        .deal-okay {
            background: rgba(250, 204, 21, 0.1);
            color: #fde047;
            border: 1px solid #854d0e;
        }

        .deal-bad {
            background: rgba(248, 113, 113, 0.1);
            color: var(--ruby);
            border: 1px solid var(--ruby-dim);
        }

        .result-error {
            font-size: 0.88em;
            color: var(--ruby);
            padding: 8px 0;

            flex: 1;

            max-width: 160px;
            height: 8px;
            background: var(--bg-inset);
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);

            height: 100%;
            border-radius: 999px;

        .deal-meter-fill.mythic {
            background: linear-gradient(90deg, #7c3aed, #a855f7, #d946ef);
        }

        .deal-meter-fill.legendary {
            background: linear-gradient(90deg, var(--gold-900), var(--gold), var(--gold-200));
        }

        .deal-meter-fill.positive {
            background: linear-gradient(90deg, var(--emerald-dim), var(--emerald));
        }

        .deal-meter-fill.negative {
            background: linear-gradient(90deg, var(--ruby-dim), var(--ruby));
        }

           INFO MODAL
           ═══════════════════════════════════════════════ */
        .info-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
        }

        .info-modal.open {
            display: block;
        }

        .info-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(3, 6, 13, 0.74);
            backdrop-filter: blur(8px);
        }

        .info-dialog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(460px, calc(100vw - 28px));
            max-height: min(680px, calc(100svh - 28px));
            overflow-y: auto;
            padding: 22px;
            background:
                linear-gradient(135deg, rgba(96, 165, 250, 0.08), transparent 36%),
                linear-gradient(180deg, var(--bg-elevated), var(--bg-card));
            border: 1px solid rgba(96, 165, 250, 0.22);
            border-radius: var(--radius-lg);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.5), 0 0 34px rgba(96, 165, 250, 0.12);
        }

        .info-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(7, 10, 18, 0.64);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1em;
            transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;

            color: var(--text);
            border-color: var(--border-strong);
            background: var(--bg-hover);
        }

            transform: scale(0.94);
        }

        .info-close:focus-visible {
            outline: 2px solid var(--info-blue);
            outline-offset: 2px;
        }

            margin-bottom: 8px;
            color: var(--info-blue);
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 1.7px;
            text-transform: uppercase;
        }

        .info-dialog h2 {
            max-width: calc(100% - 42px);
            margin-bottom: 16px;
            font-family: 'Cinzel', serif;
            font-size: 1.22em;
            color: var(--gold-200);
            letter-spacing: 1.2px;
            line-height: 1.2;
        }

        .info-steps {
            display: grid;
            gap: 10px;
            margin: 0 0 14px;
            padding: 0;
            list-style: none;
            counter-reset: info-step;
        }

        .info-steps li {
            counter-increment: info-step;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(7, 10, 18, 0.38);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.9em;
            line-height: 1.35;
        }

        .info-steps li::before {
            content: counter(info-step);
            width: 24px;
            height: 24px;
            flex: 0 0 auto;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(96, 165, 250, 0.12);
            color: var(--info-blue);
            border: 1px solid rgba(96, 165, 250, 0.26);
            font-weight: 700;
            font-size: 0.78em;
        }

        .info-result-note {
            margin-bottom: 18px;
            color: var(--text-muted);
            font-size: 0.86em;
            line-height: 1.5;
        }

        .gem-rate-title {
            margin-bottom: 10px;

            color: var(--gold);
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 1.6px;
            text-transform: uppercase;
        }

        .value-rate-title {
            margin-top: 18px;
        }

        .gem-rate-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .gem-rate-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            align-items: center;
            gap: 8px;
            min-width: 0;
            padding: 9px 10px;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-muted);
            font-size: 0.84em;
        }

        .gem-rate-row strong {
            white-space: nowrap;

        .gem-rate-equals {
            color: var(--text-dim);
            font-weight: 700;
        }

        .gem-rate-row strong {
            color: var(--gold-200);

        .value-rate-list {

        .value-rate-row {

            color: var(--text-muted);
            font-size: 0.84em;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;

                padding: 10px 16px;
                font-size: 0.85em;
            }

            .result {

            }

            .result-card {

                gap: 8px 10px;
                align-items: center;
                padding: 10px;
            }

            .result-divider { display: none; }

            .result-stat {

                min-width: 0;
            }

            .result-stat-value {
                font-size: 0.92em;
            }

            .result-savings {
                grid-column: 1;
                width: auto;
                min-width: 0;
                gap: 1px;
            }

            .result-savings-pct {
                font-size: 1.24em;
            }

            .result-savings-amount {

                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .deal-meter {
                display: none;
            }

                grid-row: 2;

                align-self: center;

            }

            { en: "Clock Potion", th: "น้ำยาหอนาฬิกา", gems: 75, cat: "potions", img: "clocktowerpotion.webp" },
            { en: "Rune of Dark Elixir", th: "รูนน้ำอมฤตมืด", gems: 2000, cat: "runes", img: "runeofdarkelixir.webp" },
            { en: "Rune of Gold", th: "รูนทองคำ", gems: 1000, cat: "runes", img: "runeofgold.webp" },
            { en: "Rune of Elixir", th: "รูนน้ำอมฤต", gems: 1000, cat: "runes", img: "runeofelixir.webp" },
            { en: "Wall Ring", th: "แหวนกำแพง", gems: 35, cat: "other", img: "wallring.webp" },
            { en: "Shovel", th: "พลั่วแห่งสิ่งกีดขวาง", gems: 500, cat: "other", img: "shovelofobstacles.webp" },
            { en: "Shiny Ore", th: "แร่วิบวับ", gems: 1, cat: "ores", img: "shiny-ore.webp" },
            { en: "Glowy Ore", th: "แร่เรืองรอง", gems: 5, cat: "ores", img: "glowy-ore.webp" },
            { en: "Starry Ore", th: "แร่ประกายดาว", gems: 35, cat: "ores", img: "starry-ore.webp" },
        ];

        function itemName(item) { return item[lang]; }

        const categories = [
            { key: "books" },
            { key: "potions" },
            { key: "runes" },
            { key: "ores" },
            { key: "other" },
        ];

        const gemPacks = [
            { gems: 80, thb: 15 },
            { gems: 500, thb: 69 },
            { gems: 1200, thb: 149 },
            { gems: 1850, thb: 219 },
            { gems: 2500, thb: 299 },
            { gems: 6500, thb: 729 },
            { gems: 14000, thb: 1450 },
            { gems: 30000, thb: 2990 },
        ];

        const valueLevels = [
            { key: 'mythic', min: 80, dealClass: 'deal-mythic', meterClass: 'mythic' },
            { key: 'legendary', min: 60, dealClass: 'deal-legendary', meterClass: 'legendary' },
            { key: 'great', min: 40, dealClass: 'deal-great', meterClass: 'positive' },
            { key: 'good', min: 25, dealClass: 'deal-good', meterClass: 'positive' },
            { key: 'okay', min: 10, dealClass: 'deal-okay', meterClass: 'positive' },
            { key: 'bad', min: null, dealClass: 'deal-bad', meterClass: 'negative' },
        ];

        /* ═══════════════════════════════════
           STATE
           ═══════════════════════════════════ */
        const pack = new Array(items.length).fill(0);

        /* ═══════════════════════════════════
           GEM → THB CONVERSION (DP)
           ═══════════════════════════════════ */
        const dpCache = new Map();

        function gemsToTHB(totalGems) {
            if (totalGems <= 0) return 0;
            if (dpCache.has(totalGems)) return dpCache.get(totalGems);

            let baseCost = 0;
            let remaining = totalGems;

            const largestPack = gemPacks[gemPacks.length - 1];
            if (remaining >= largestPack.gems) {
                const count = Math.floor(remaining / largestPack.gems);
                baseCost = count * largestPack.thb;
                remaining = remaining % largestPack.gems;
            }

            if (remaining === 0) { dpCache.set(totalGems, baseCost); return baseCost; }

            const dp = new Array(remaining + 1).fill(Infinity);
            dp[0] = 0;

            for (let i = 1; i <= remaining; i++) {
                for (const p of gemPacks) {
                    const prev = Math.max(0, i - p.gems);
                    const cost = dp[prev] + p.thb;
                    if (cost < dp[i]) dp[i] = cost;
                }
            }

            const result = baseCost + dp[remaining];
            dpCache.set(totalGems, result);
            return result;
        }

        /* ═══════════════════════════════════
           RENDER
           ═══════════════════════════════════ */
        function getTotalGems() {
            return pack.reduce((sum, qty, i) => sum + qty * items[i].gems, 0);
        }

        function getValueLevel(pct) {
            return valueLevels.find(level => level.min === null || pct >= level.min);
        }

        function valueLevelText(level) {
            return level.min === null ? t('belowTen') : `${level.min}%+`;
        }

        function renderUI() {
            document.getElementById('title').textContent = t('title');
            document.getElementById('subtitle').textContent = t('subtitle');
            document.getElementById('disclaimer').textContent = t('disclaimer');
            document.getElementById('pack-title').textContent = t('yourPack');
            document.getElementById('catalog-title').textContent = t('itemCatalog');
            document.getElementById('label-total-gems').textContent = t('totalGems');
            document.getElementById('label-original-price').textContent = t('originalPrice');
            document.getElementById('label-sale-price').textContent = t('salePrice');
            document.getElementById('btn-calc').textContent = t('calculate');
            document.getElementById('btn-clear').textContent = t('clearAll');
            document.getElementById('lang-toggle').textContent = t('langBtn');
            const storeBtn = document.getElementById('store-btn');
            storeBtn.textContent = lang === 'th' ? 'สโตร์' : 'STORE';
            storeBtn.href = lang === 'th'
                ? 'https://store.supercell.com/th/clashofclans?boost=KLAWKLA'
                : 'https://store.supercell.com/clashofclans?boost=KLAWKLA';
            renderInfoContent();
        }

        function renderInfoContent() {
            const infoToggle = document.getElementById('info-toggle');
            const infoClose = document.getElementById('info-close');
            infoToggle.setAttribute('aria-label', t('infoLabel'));
            infoToggle.title = t('infoLabel');
            infoClose.setAttribute('aria-label', t('infoClose'));
            document.getElementById('info-kicker').textContent = t('infoKicker');
            document.getElementById('info-title').textContent = t('infoTitle');
            document.getElementById('info-steps').innerHTML = t('infoSteps')
                .map(step => `<li>${step}</li>`)
                .join('');
            document.getElementById('info-result-note').textContent = t('infoResultNote');
            document.getElementById('gem-rate-title').textContent = t('gemRateTitle');
            document.getElementById('gem-rate-list').innerHTML = gemPacks
                .map(packRate => `<div class="gem-rate-row"><span>${packRate.gems.toLocaleString()} <span aria-hidden="true">💎</span></span><span class="gem-rate-equals"> = </span><strong>${packRate.thb.toLocaleString()} THB</strong></div>`)
                .join('');
            document.getElementById('value-rate-title').textContent = t('valueRateTitle');
            document.getElementById('value-rate-list').innerHTML = valueLevels
                .map(level => `<div class="value-rate-row"><span class="value-rate-min">${valueLevelText(level)}</span><span class="deal-tag ${level.dealClass}">${t(level.key)}</span></div>`)
                .join('');
        }

        function setInfoModal(open) {
            const modal = document.getElementById('info-modal');
            const toggle = document.getElementById('info-toggle');
            modal.classList.toggle('open', open);
            modal.setAttribute('aria-hidden', String(!open));
            toggle.setAttribute('aria-expanded', String(open));
            if (open) {
                document.getElementById('info-close').focus();
            } else {
                toggle.focus();
            }
        }

        function render() {
            renderUI();
            renderPack();
            renderCatalog();
            document.getElementById('result').innerHTML = '';
        }

        function renderPack() {
            const listEl = document.getElementById('pack-list');
            const totalEl = document.getElementById('pack-total');
            const hasItems = pack.some(q => q > 0);

            if (!hasItems) {
                listEl.innerHTML = `<div class="pack-empty">${t('emptyPack')}</div>`;
                totalEl.style.display = 'none';
                return;
            }

            let html = '';
            let totalGemsVal = 0;

            for (let i = 0; i < items.length; i++) {
                if (pack[i] > 0) {
                    const itemGems = items[i].gems * pack[i];
                    totalGemsVal += itemGems;
                    html += `<div class="pack-item">
                        <div class="catalog-item-icon"><img src="images/${items[i].img}" alt="" aria-hidden="true" loading="lazy"></div>
                        <div class="pack-item-body">
                            <div class="pack-item-name">${itemName(items[i])} &times;${pack[i]}</div>
                            <div class="pack-item-detail"><span class="gem-dot"></span>${itemGems.toLocaleString()} ${t('gems')}</div>
                        </div>
                        <button class="pack-item-remove" data-remove="${i}" aria-label="${t('remove')} ${itemName(items[i])}">&times;</button>
                    </div>`;
                }
            }

            listEl.innerHTML = html;
            totalEl.style.display = 'block';
            document.getElementById('total-gems').textContent = totalGemsVal.toLocaleString();
            document.getElementById('total-thb').textContent = gemsToTHB(totalGemsVal).toLocaleString() + ' THB';
        }

        function renderCatalog() {
            const catalogEl = document.getElementById('catalog');
            let html = '';

            for (const cat of categories) {
                html += `<div class="category-header">${t('categories')[cat.key]}</div>`;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].cat !== cat.key) continue;
                    const qty = pack[i];
                    const isActive = qty > 0;
                    html += `<div class="catalog-item${isActive ? ' active' : ''}">
                        <div class="catalog-item-icon"><img src="images/${items[i].img}" alt="" aria-hidden="true" loading="lazy"></div>
                        <div class="catalog-item-info">
                            <div class="catalog-item-name">${itemName(items[i])}</div>
                            <div class="catalog-item-gems"><span class="gem-dot"></span>${items[i].gems} ${t('gems')}</div>
                        </div>
                        <div class="catalog-item-controls">
                            <button class="btn btn-sub${qty === 0 ? ' disabled' : ''}" data-sub="${i}" aria-label="${t('decrease')} ${itemName(items[i])}">&minus;</button>
                            <input type="number" class="catalog-item-qty${qty === 0 ? ' zero' : ''}" value="${qty}" min="0" inputmode="numeric" data-qty="${i}" aria-label="${t('quantity')} ${itemName(items[i])}">
                            <button class="btn btn-add" data-add="${i}" aria-label="${t('increase')} ${itemName(items[i])}">+</button>
                        </div>
                    </div>`;
                }
            }

            catalogEl.innerHTML = html;
        }

        /* ═══════════════════════════════════
           CALCULATE
           ═══════════════════════════════════ */
        function calculate() {
            const totalGems = getTotalGems();
            const resultEl = document.getElementById('result');

            if (totalGems === 0) {
                resultEl.innerHTML = `<div class="result-error">${t('errNoItems')}</div>`;
                return;
            }

            const salePrice = parseFloat(document.getElementById('sale-price').value);
            if (isNaN(salePrice) || salePrice < 0) {
                resultEl.innerHTML = `<div class="result-error">${t('errNoPrice')}</div>`;
                return;
            }

            const originalTHB = gemsToTHB(totalGems);
            const savings = originalTHB - salePrice;
            const pct = originalTHB > 0 ? ((savings / originalTHB) * 100) : 0;
            const pctRounded = Number(pct.toFixed(1));
            const pctAbs = Math.abs(pctRounded).toFixed(1);
            const isPositive = savings >= 0;

            const dealLevel = getValueLevel(pctRounded);
            const dealLabel = t(dealLevel.key);
            const dealClass = dealLevel.dealClass;
            const meterClass = dealLevel.meterClass;

            const meterWidth = Math.min(100, Math.max(0, pctRounded));
            const saveText = isPositive ? t('youSave') : t('youOverpay');

            resultEl.innerHTML = `<div class="result">
                <div class="result-card">
                    <div class="result-stat">
                        <span class="result-stat-label">${t('original')}</span>
                        <span class="result-stat-value">${originalTHB.toLocaleString()} THB</span>
                    </div>
                    <div class="result-divider"></div>
                    <div class="result-stat">
                        <span class="result-stat-label">${t('sale')}</span>
                        <span class="result-stat-value">${salePrice.toLocaleString()} THB</span>
                    </div>
                    <div class="result-divider"></div>
                    <div class="result-savings">
                        <span class="result-savings-pct ${isPositive ? 'positive' : 'negative'}">${isPositive ? '' : '-'}${pctAbs}%</span>
                        <span class="result-savings-amount">${saveText} ${Math.abs(savings).toLocaleString()} THB</span>
                    </div>
                    <div class="deal-meter">
                        <div class="deal-meter-fill ${meterClass}" style="width:${meterWidth}%"></div>
                    </div>
                    <span class="deal-tag ${dealClass}">${dealLabel}</span>
                </div>
            </div>`;
        }

        /* ═══════════════════════════════════
           EVENT HANDLERS
           ═══════════════════════════════════ */
        document.getElementById('catalog').addEventListener('click', (e) => {
            const addBtn = e.target.closest('[data-add]');
            const subBtn = e.target.closest('[data-sub]');
            if (addBtn) {
                pack[parseInt(addBtn.dataset.add)]++;
                render();
            } else if (subBtn) {
                const idx = parseInt(subBtn.dataset.sub);
                pack[idx] = Math.max(0, pack[idx] - 1);
                render();
            }
        });

        document.getElementById('catalog').addEventListener('input', (e) => {
            const qtyInput = e.target.closest('[data-qty]');
            if (!qtyInput) return;
            const idx = parseInt(qtyInput.dataset.qty);
            const val = parseInt(qtyInput.value);
            pack[idx] = isNaN(val) || val < 0 ? 0 : val;
            renderPack();
            // Update active state and minus button without losing focus
            const item = qtyInput.closest('.catalog-item');
            item.classList.toggle('active', pack[idx] > 0);
            qtyInput.classList.toggle('zero', pack[idx] === 0);
            const subBtn = item.querySelector('[data-sub]');
            subBtn.classList.toggle('disabled', pack[idx] === 0);
        });

        document.getElementById('pack-list').addEventListener('click', (e) => {
            const removeBtn = e.target.closest('[data-remove]');
            if (removeBtn) {
                pack[parseInt(removeBtn.dataset.remove)] = 0;
                render();
            }
        });

        document.getElementById('btn-calc').addEventListener('click', calculate);

        document.getElementById('info-toggle').addEventListener('click', () => {
            setInfoModal(true);
        });

        document.getElementById('info-modal').addEventListener('click', (e) => {
            if (e.target.closest('[data-info-close]')) {
                setInfoModal(false);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('info-modal').classList.contains('open')) {
                setInfoModal(false);
            }
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            pack.fill(0);
            document.getElementById('sale-price').value = '';
            render();
        });

        document.getElementById('sale-price').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') calculate();
        });

        document.getElementById('lang-toggle').addEventListener('click', () => {
            lang = lang === 'th' ? 'en' : 'th';
            render();
        });

        /* Init */
        render();
    </script>
</body>
</html>
